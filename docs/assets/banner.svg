<svg width="1280" height="300" viewBox="0 0 1280 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="300" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#060d1f"/>
      <stop offset="1" stop-color="#0d1e38"/>
    </linearGradient>
    <radialGradient id="glow1" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1020 80) scale(360)">
      <stop offset="0" stop-color="#2563eb" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#2563eb" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(220 260) scale(320)">
      <stop offset="0" stop-color="#14b8a6" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#14b8a6" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="pulse" x1="80" y1="0" x2="520" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#3b82f6"/>
      <stop offset="1" stop-color="#2dd4bf"/>
    </linearGradient>
    <linearGradient id="orb" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3b82f6"/>
      <stop offset="1" stop-color="#14b8a6"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="300" fill="url(#bg)"/>
  <rect width="1280" height="300" fill="url(#glow1)"/>
  <rect width="1280" height="300" fill="url(#glow2)"/>

  <!-- voice orb with rings -->
  <circle cx="1040" cy="150" r="104" stroke="#2dd4bf" stroke-opacity="0.16" stroke-width="2"/>
  <circle cx="1040" cy="150" r="76" stroke="#60a5fa" stroke-opacity="0.25" stroke-width="2"/>
  <circle cx="1040" cy="150" r="50" fill="url(#orb)" fill-opacity="0.92"/>
  <!-- waveform bars inside the orb -->
  <g fill="#ffffff" fill-opacity="0.95">
    <rect x="1006" y="138" width="7" height="24" rx="3.5"/>
    <rect x="1020" y="126" width="7" height="48" rx="3.5"/>
    <rect x="1034" y="116" width="7" height="68" rx="3.5"/>
    <rect x="1048" y="130" width="7" height="40" rx="3.5"/>
    <rect x="1062" y="140" width="7" height="20" rx="3.5"/>
  </g>

  <!-- heartbeat trace -->
  <path d="M80 222 H304 L322 196 L348 244 L376 168 L398 222 H560"
        stroke="url(#pulse)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.85"/>

  <text x="80" y="124" font-family="Inter, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="58" font-weight="800" letter-spacing="-1.5" fill="#ffffff">Rapid Recovery</text>
  <text x="82" y="166" font-family="Inter, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="22" font-weight="500" fill="#b8c6d6">Maya, a voice-first recovery companion for life after discharge</text>

  <text x="80" y="262" font-family="Inter, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="14" font-weight="600" letter-spacing="2" fill="#5eead4">GEMINI 3 LIVE · GOOGLE ADK · MONGODB ATLAS</text>
</svg>
