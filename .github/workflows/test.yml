name: Tests

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  unit-test-backend:
    name: Unit Test - (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11"]

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: "backend/uv.lock"
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --group dev

      - name: Run unit tests with coverage
        run: uv run pytest tests/unit/ --cov=src --cov-report=xml --cov-fail-under=80

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: backend/coverage.xml
          flags: backend
          fail_ci_if_error: false

  integration-test-backend:
    name: Integration Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    # MongoDB for the DB-backed F1 tests. F1 uses plain queries plus a sparse
    # unique index (no Atlas Vector Search), so a stock mongo image is enough.
    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --quiet --eval 'db.adminCommand({ping:1})'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      ENV: dev
      MONGODB_URI: mongodb://localhost:27017
      MONGODB_DB: homeward_test
      MONGODB_TEST_DB: homeward_test

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: "backend/uv.lock"
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync --group dev

      # The live Gemini agent test is skipped automatically without GOOGLE_API_KEY;
      # the scripted-LLM agent test still runs and covers the reply behavior.
      - name: Run integration tests
        run: uv run pytest tests/integration/ -v
