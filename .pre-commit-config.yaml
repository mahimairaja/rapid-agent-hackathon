default_language_version:
  python: python3

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-added-large-files
        exclude: (^|/)uv\.lock$
      - id: check-toml
      - id: check-yaml
        args:
          - --unsafe
      - id: end-of-file-fixer
      - id: trailing-whitespace
  # Backend (Python): lint + format
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.3
    hooks:
      - id: ruff
        args:
          - --fix
        files: ^backend/
      - id: ruff-format
        files: ^backend/
  # Frontend (React/TS): format with Prettier via the project's own toolchain
  - repo: local
    hooks:
      - id: frontend-prettier
        name: prettier (frontend)
        language: system
        entry: pnpm --dir frontend exec prettier --write .
        files: ^frontend/
        exclude: ^frontend/(node_modules|dist|pnpm-lock\.yaml)
        pass_filenames: false

ci:
  # pre-commit.ci has no Node/pnpm; the frontend hook runs locally only.
  skip:
    - frontend-prettier
  autofix_commit_msg: 🎨 [pre-commit.ci] Auto format from pre-commit.com hooks
  autoupdate_commit_msg: ⬆ [pre-commit.ci] pre-commit autoupdate
